name: Lybica DAST
# Reusable workflow: OWASP ZAP baseline against a target -> public DefectDojo.
# DAST runs on a SCHEDULE supplied by the caller (GitHub crons are static YAML,
# so the cadence lives in the caller; the target is configurable at runtime via
# vars.LYBICA_DAST_TARGET or .lybica.yml -> dast.target).
# Caller:
#   on: { schedule: [{cron: "0 2 * * 1"}], workflow_dispatch: {} }
#   jobs: { dast: { uses: teomach/lybica-action/.github/workflows/dast.yml@v2, secrets: inherit } }
on:
  workflow_call:
    inputs:
      product:
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  dast:
    name: DAST (ZAP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEFECTDOJO_URL: ${{ vars.DEFECTDOJO_URL || 'https://app.lybica.com' }}
      DEFECTDOJO_API_TOKEN: ${{ secrets.DEFECTDOJO_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve DAST target
        id: t
        shell: bash
        env:
          VAR_TARGET: ${{ vars.LYBICA_DAST_TARGET }}
        run: |
          T="$VAR_TARGET"
          if [ -z "$T" ] && [ -f .lybica.yml ]; then
            T=$(python3 -c "import yaml;print(((yaml.safe_load(open('.lybica.yml')) or {}).get('dast') or {}).get('target','') or '')" 2>/dev/null || true)
          fi
          echo "target=$T" >> "$GITHUB_OUTPUT"
          [ -n "$T" ] && echo "DAST target: $T" || echo "No DAST target set (skipping)."
      - name: ZAP baseline
        if: steps.t.outputs.target != ''
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.t.outputs.target }}
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-J zap.json'
      - name: Upload ZAP report -> DefectDojo
        if: steps.t.outputs.target != ''
        shell: bash
        env:
          PRODUCT: ${{ inputs.product != '' && inputs.product || github.event.repository.name }}
        run: |
          [ -f zap.json ] || { echo "no zap.json produced"; exit 0; }
          python3 -m pip install -q requests
          python3 - <<'PY'
          import os, requests
          url = os.environ["DEFECTDOJO_URL"].rstrip("/")
          tok = os.environ["DEFECTDOJO_API_TOKEN"]
          data = {"scan_type": "ZAP Scan", "product_name": os.environ["PRODUCT"],
                  "engagement_name": "DAST", "auto_create_context": "true",
                  "close_old_findings": "true", "minimum_severity": "Low"}
          with open("zap.json", "rb") as f:
              r = requests.post(url + "/api/v2/import-scan/", headers={"Authorization": "Token " + tok},
                                data=data, files={"file": ("zap.json", f)}, timeout=180)
          print("[lybica] import-scan", r.status_code, r.text[:200])
          PY
