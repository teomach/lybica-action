# Lybica scanner registry — tools are pre-baked into the Docker image.
# Add a scanner = add an entry (name/stage/kind/run/report/scan_type/vuln).
scanners:
- name: sast
  stage: Lybica / SAST
  kind: code
  enabled: true
  run: semgrep scan --config p/default --json --output {report} {target} || true
  report: semgrep.json
  scan_type: Semgrep JSON Report
  vuln: sast
- name: secrets
  stage: Lybica / Secrets
  kind: code
  enabled: true
  run: trufflehog filesystem {target} --json --no-update > {report} 2>/dev/null ||
    true
  report: trufflehog.json
  scan_type: Trufflehog Scan
  vuln: secret
- name: sbom
  stage: Lybica / SBOM
  kind: code
  enabled: true
  run: syft {target} -o cyclonedx-json={report} || true
  report: sbom.cdx.json
  scan_type: CycloneDX Scan
  vuln: sbom
- name: sca
  stage: Lybica / SCA
  kind: code
  enabled: true
  run: grype dir:{target} -o json --file {report} || true
  report: grype.json
  scan_type: Anchore Grype
  vuln: dependency
- name: iac
  stage: Lybica / IaC
  kind: code
  enabled: true
  run: checkov -d {target} --framework terraform --output json --soft-fail --download-external-modules
    true > {report} || true
  report: checkov.json
  scan_type: Checkov Scan
  vuln: iac
- name: dast
  stage: Lybica / DAST
  kind: dast
  enabled: false
  run: docker run --rm -v $(pwd):/zap/wrk -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py
    -t {target} -J {report} || true
  report: zap.json
  scan_type: ZAP Scan
  vuln: dast
